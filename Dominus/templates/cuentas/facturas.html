{% extends 'cuentas/main.html' %}

{% block content %}


		<div class="row">
			<div class="col-md">
				<div class="card card-body">
					<h5>Facturas</h5>
				</div>
				<div class="card card-body">
					<table class="table">
							<tr><th>ID</th>
							<th>Link</th>


						</tr>


                        {% for i in facts %}
                            <tr>

                                <td>{{ i }}</td>
                                <td><a href="{% url 'factura' i %}">Factura</a></td>


                                    {% if i in notas %}
                                 <td><a href="{% url 'notacredito' i %}">Devolucion</a></td>
                                    {% endif %}

                            </tr>
                        {% endfor %}

					</table>
				</div>
			</div>

		</div>

{% endblock %}
